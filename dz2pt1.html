<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Список фруктів</title>
<style>
body {
    font-family: Arial, sans-serif;
}

.list-container {
    background-color: #f4a3ad;
    width: 300px;
    padding: 15px;
    margin: 20px auto;
}

ol {
    padding: 0;
    margin: 0;
    list-style-position: inside;
}

li {
    background-color: #e07a86;
    margin: 8px 0;
    padding: 10px;
    color: white;
}

li span {
    background-color: #c05a66;
    padding: 5px 10px;
}

.active {
    background-color: #d96b78;
}
</style>
</head>
<body>

<div class="list-container">
    <ol>
        <li><span>Apple</span></li>
        <li class="active"><span>Orange</span></li>
        <li><span>Pineapple</span></li>
        <li><span>Pear</span></li>
        <li><span>Cherry</span></li>
    </ol>
</div>

</body>
</html>
