<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            width: 60%;
            margin: 50px auto;
            background-color: #e6e6e6;
            padding: 30px;
        }
        .player {
            margin-bottom: 20px;
        }
        .cards {
            margin-top: 10px;
        }
        .card {
            display: inline-block;
            width: 40px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            margin-right: 5px;
            background-color: #ffffff;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
        }
        .red {
            color: red;
        }
        .black {
            color: black;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="player">
        <strong>Player 1:</strong>
        <div class="cards">
            <div class="card black">2♣</div>
            <div class="card red">9♥</div>
            <div class="card red">6♥</div>
            <div class="card red">A♦</div>
            <div class="card black">Q♠</div>
            <div class="card black">J♣</div>
        </div>
    </div>

    <div class="player">
        <strong>Player 2:</strong>
        <div class="cards">
            <div class="card red">3♥</div>
            <div class="card black">A♣</div>
            <div class="card black">10♣</div>
            <div class="card red">K♦</div>
            <div class="card black">8♠</div>
            <div class="card red">3♥</div>
        </div>
    </div>
</div>

</body>
</html>
