<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Clock</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eee;
}

.clock {
    width: 200px;
    height: 200px;
    border: 4px solid teal;
    border-radius: 50%;
    position: relative;
}

.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%) rotate(0deg);
}

.hour {
    width: 4px;
    height: 50px;
    background: teal;
    animation: hourRotate 60s linear infinite;
}

.minute {
    width: 2px;
    height: 70px;
    background: teal;
    animation: minuteRotate 10s linear infinite;
}

@keyframes hourRotate {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
}

@keyframes minuteRotate {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
}
</style>
</head>
<body>

<div class="clock">
    <div class="hand hour"></div>
    <div class="hand minute"></div>
</div>

</body>
</html>
