<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Doors</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eee;
    font-family: Arial, sans-serif;
}

.container {
    position: relative;
    width: 300px;
    height: 150px;
    display: flex;
}

.text {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    z-index: 0;
}

.door {
    width: 50%;
    height: 100%;
    background: #7b2c5c;
    transition: transform 2s;
    z-index: 1;
}

.left {
    transform-origin: left;
}

.right {
    transform-origin: right;
}

.container:hover .left {
    transform: perspective(600px) rotateY(-70deg);
}

.container:hover .right {
    transform: perspective(600px) rotateY(70deg);
}

.container:not(:hover) .door {
    transition: transform 0s;
}
</style>
</head>
<body>

<div class="container">
    <div class="text">HELLO</div>
    <div class="door left"></div>
    <div class="door right"></div>
</div>

</body>
</html>
