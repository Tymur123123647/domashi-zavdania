<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table</title>

<style>
body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

div {
    overflow: auto;
    max-width: 100%;
    max-height: 500px;
    border: 1px solid #ccc;
    background: white;
}

table {
    border-collapse: collapse;
    min-width: 900px;
}

th,
td {
    padding: 20px 40px;
    text-align: center;
    font-size: 20px;
}

thead th {
    background: #bfefff;
    position: sticky;
    top: 0;
    z-index: 2;
}

tbody th {
    background: #bfefff;
    position: sticky;
    left: 0;
    z-index: 1;
}

thead th:first-child {
    left: 0;
    z-index: 3;
}

tbody tr:nth-child(even) td {
    background: #ececec;
}

tbody tr:nth-child(odd) td {
    background: #ffffff;
}
</style>
</head>

<body>

<div>
<table>
